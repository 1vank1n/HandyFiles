name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          # macOS x64 disabled: ort-sys has no prebuilt ONNX for x86_64-apple-darwin
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux dependencies
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            libclang-dev \
            cmake

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}

      # Collect built files into a flat directory for easy upload
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/${{ matrix.target }}/release/bundle \
            \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) \
            -exec cp {} dist-artifacts/ \;
          ls -lh dist-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HandyFiles-${{ matrix.label }}
          path: dist-artifacts/*
          if-no-files-found: ignore

  # Create GitHub Release when a tag is pushed
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: HandyFiles ${{ github.ref_name }}
          body: |
            ## HandyFiles ${{ github.ref_name }}

            Cross-platform desktop app for transcribing audio/video files locally.

            ### Install
            - **macOS (Apple Silicon):** Download `.dmg`, open, drag to Applications, run `xattr -cr /Applications/HandyFiles.app`
            - **Windows:** Download `.exe` installer
            - **Linux:** Download `.deb` or `.AppImage`

            ### What's new
            See [full changelog](https://github.com/${{ github.repository }}/blob/main/README.md).
          files: artifacts/*
